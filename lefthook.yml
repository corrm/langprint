# Git hooks. No `cargo fmt` — this repo is deliberately not rustfmt-formatted.

# Commit time: fast lint + compile, only when Rust sources change.
# clippy --all-targets compiles every target, so a separate build step is redundant.
pre-commit:
  commands:
    clippy:
      glob: "*.rs"
      run: cargo clippy --all-targets -- -D warnings

# Push time: the expensive full validation before code is shared.
pre-push:
  parallel: true
  commands:
    test:
      run: cargo test
    doc:
      run: cargo doc --no-deps
      env:
        RUSTDOCFLAGS: "-D warnings"

commit-msg:
  commands:
    check-message:
      run: |
        if ! grep -qE '^(feat|fix|docs|style|refactor|test|chore)(\(.+\))?: .+' {1}; then
          echo "Commit message must follow conventional commits format"
          exit 1
        fi
