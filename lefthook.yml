pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --check
    clippy:
      glob: "*.rs"
      run: cargo clippy --all-targets -- -D warnings

# Push time: the expensive full validation before code is shared.
pre-push:
  parallel: true
  commands:
    test:
      run: cargo test
    doc:
      run: cargo doc --no-deps
      env:
        RUSTDOCFLAGS: "-D warnings"

commit-msg:
  commands:
    check-message:
      run: |
        if ! grep -qE '^(feat|fix|docs|style|refactor|test|chore)(\(.+\))?: .+' {1}; then
          echo "Commit message must follow conventional commits format"
          exit 1
        fi
